<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CMS Admin Dashboard</title>
<link rel="stylesheet" href="./admin.css">
<link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body>

<input type="checkbox" id="menu-toggle">

<div class="sidebar">
    <div class="side-header">
        <h3>C<span>MS</span></h3>
    </div>

    <div class="side-content">
        <div class="profile">
            <div id="adminAvatar" class="profile-img bg-img"></div>
            <h4 id="adminName">Admin</h4>
            <small id="adminRole">Admin • CMS</small>
        </div>

        <div class="side-menu">
            <ul>
                <li>
                    <a href="" class="active">
                        <span class="las la-home"></span>
                        <small>Dashboard</small>
                    </a>
                </li>
                <li>
                    <a href="../admindashboard/profile.html">
                        <span class="las la-user-graduate"></span>
                        <small>Profile</small>
                    </a>
                </li>
                <li>
                    <a href="../admindashboard/ai-chat.html">
                        <span class="las la-chalkboard-teacher"></span>
                        <small>AI Assistant</small>
                    </a>
                </li>
                <li>
                    <a href="../admindashboard/mind-games.html">
                        <span class="las la-puzzle-piece"></span>
                        <small>Mind Games</small>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>


<div class="main-content">

<header>
<div class="header-content">
    <label for="menu-toggle">
        <span class="las la-bars"></span>
    </label>

    <div class="header-menu">
        <div class="notify-icon">
            <span class="las la-bell"></span>
            <span class="notify">5</span>
        </div>

        <div class="user">
            <div class="bg-img" style="background-image: url('image/sid.jpg');"></div>
            <span class="las la-power-off"></span>
            <span>Logout</span>
        </div>
    </div>
</div>
</header>


<main>

<div class="page-header">
    <h1>College Dashboard</h1>
    <small>Home / CMS Dashboard</small>
</div>

<div class="page-content">

<div class="analytics">

<div class="card">
    <div class="card-head">
        <h2>1,240</h2>
        <span class="las la-user-graduate"></span>
    </div>
    <div class="card-progress">
        <small>Total Students</small>
        <div class="card-indicator">
            <div class="indicator one" style="width: 80%"></div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-head">
        <h2>85</h2>
        <span class="las la-chalkboard-teacher"></span>
    </div>
    <div class="card-progress">
        <small>Total Faculty</small>
        <div class="card-indicator">
            <div class="indicator two" style="width: 70%"></div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-head">
        <h2>32</h2>
        <span class="las la-book"></span>
    </div>
    <div class="card-progress">
        <small>Total Courses</small>
        <div class="card-indicator">
            <div class="indicator three" style="width: 60%"></div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-head">
        <h2>12</h2>
        <span class="las la-building"></span>
    </div>
    <div class="card-progress">
        <small>Departments</small>
        <div class="card-indicator">
            <div class="indicator four" style="width: 90%"></div>
        </div>
    </div>
</div>

</div>

<!-- Realtime Groups & Chat Section -->
<section class="admin-chat">
    <div class="groups-panel">
        <div class="panel-header">
            <h2>Groups</h2>
            <button id="createGroupBtn" class="btn-primary small">+ New Group</button>
        </div>
        <ul id="groupsList" class="groups-list">
            <!-- Filled by admin.js -->
        </ul>
    </div>

    <div class="chat-panel">
        <div class="panel-header">
            <h2 id="chatGroupTitle">Select a group</h2>
            <span id="chatRoleBadge" class="role-badge">Admin</span>
        </div>
        <div id="messagesList" class="messages-list">
            <!-- Filled by admin.js -->
        </div>
        <form id="messageForm" class="message-form">
            <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off">
            <button type="submit" class="btn-primary small">Send</button>
        </form>
    </div>
</section>

</div>
</main>
</div>

<script src="../config.js"></script>
<script src="admin.js"></script>
</body>
</html>

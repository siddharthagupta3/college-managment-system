<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant - CMS</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="ai-chat-wrapper">
    <div class="ai-chat-card">
      <h1>AI Study Assistant</h1>
      <p class="ai-subtitle">Ask anything about college, courses, or projects.</p>
      <div id="aiMessages" class="ai-messages"></div>
      <form id="aiForm" class="ai-form">
        <input id="aiInput" type="text" placeholder="Type your question..." autocomplete="off" required />
        <button type="submit" class="btn-primary small">Ask</button>
      </form>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="ai-chat.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Resume Builder</title>
  <desc id="desc">Professional resume editor dashboard illustration.</desc>
  <defs>

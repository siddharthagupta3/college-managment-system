<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Gemini Chat Bot</title>
  <desc id="desc">Modern AI chat panel with Gemini style gradient star.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b16"/>
      <stop offset="45%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="30%" stop-color="#818cf8"/>
      <stop offset="65%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="28" fill="url(#bg2)"/>
  <circle cx="120" cy="88" r="64" fill="#22d3ee" opacity="0.16"/>
  <circle cx="700" cy="430" r="82" fill="#a78bfa" opacity="0.16"/>

  <g transform="translate(70 88)">
    <rect x="0" y="0" width="468" height="330" rx="22" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <rect x="24" y="24" width="420" height="42" rx="12" fill="#111827"/>
    <text x="44" y="50" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">Gemini Assistant</text>

    <rect x="24" y="92" width="280" height="48" rx="14" fill="#1e293b"/>
    <text x="40" y="122" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="15">Explain quick sort in Hindi.</text>

    <rect x="164" y="158" width="280" height="82" rx="16" fill="url(#chip)" opacity="0.95"/>
    <text x="184" y="186" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Sure. Quick sort ek divide-and-</text>
    <text x="184" y="206" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="14">conquer algorithm hai...</text>
    <text x="184" y="226" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Average complexity: O(n log n)</text>

    <rect x="24" y="264" width="420" height="42" rx="12" fill="#111827" stroke="#334155"/>
    <circle cx="52" cy="285" r="8" fill="#64748b"/>
    <rect x="72" y="278" width="250" height="14" rx="7" fill="#475569"/>
    <circle cx="410" cy="285" r="12" fill="url(#gem)"/>
  </g>

  <g transform="translate(560 100)">
    <path d="M84 0L104 60L164 80L104 100L84 160L64 100L4 80L64 60Z" fill="url(#gem)"/>
    <path d="M24 220c0-32 26-58 58-58h52c32 0 58 26 58 58s-26 58-58 58H82c-32 0-58-26-58-58z" fill="#0f172a" stroke="#334155"/>
    <text x="108" y="228" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">AI</text>
    <text x="108" y="252" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Powered</text>
  </g>

  <text x="70" y="478" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Gemini Chat Bot</text>
</svg>

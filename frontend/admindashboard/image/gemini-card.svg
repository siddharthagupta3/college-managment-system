<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Gemini Chat Bot</title>
  <desc id="desc">Gemini inspired AI symbol with chat interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="35%" stop-color="#a78bfa"/>
      <stop offset="70%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="28"/>
  <circle cx="675" cy="86" r="52" fill="#1d4ed8" opacity="0.22"/>
  <circle cx="104" cy="430" r="88" fill="#22d3ee" opacity="0.14"/>

  <g transform="translate(440 92)">
    <path d="M90 0L110 60L170 80L110 100L90 160L70 100L10 80L70 60Z" fill="url(#gem)" filter="url(#glow)"/>
    <path d="M20 28L28 52L52 60L28 68L20 92L12 68L-12 60L12 52Z" fill="#93c5fd" opacity="0.95"/>
    <path d="M170 22L178 46L202 54L178 62L170 86L162 62L138 54L162 46Z" fill="#c4b5fd" opacity="0.95"/>
  </g>

  <g transform="translate(68 120)">
    <rect x="0" y="0" width="430" height="280" rx="22" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <rect x="24" y="24" width="220" height="14" rx="7" fill="#334155"/>
    <rect x="24" y="58" width="360" height="12" rx="6" fill="#1e293b"/>
    <rect x="24" y="84" width="330" height="12" rx="6" fill="#1e293b"/>
    <rect x="24" y="110" width="286" height="12" rx="6" fill="#1e293b"/>

    <rect x="24" y="162" width="250" height="56" rx="14" fill="#0f172a" stroke="#475569"/>
    <rect x="40" y="183" width="140" height="12" rx="6" fill="#64748b"/>

    <rect x="288" y="162" width="118" height="56" rx="14" fill="url(#gem)" opacity="0.9"/>
    <path d="M334 179L352 190L334 201" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="72" y="462" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Gemini Chat Bot</text>
</svg>

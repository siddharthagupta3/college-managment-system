<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - CMS</title>
  <link rel="stylesheet" href="signup.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
  <div class="container auth-page">
    <div class="form-box login">
      <form id="resetForm">
        <h1>Reset Password</h1>
        <p class="form-hint">Enter your new password below.</p>
        <div class="input-box">
          <input id="newPassword" type="password" placeholder="New password (min 6)" required minlength="6">
          <i class="bx bxs-lock-alt"></i>
        </div>
        <button type="submit" class="btn">Update Password</button>
        <p id="resetStatus" class="form-footer"></p>
        <a href="singup.html" class="back-link">Back to Login</a>
      </form>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>

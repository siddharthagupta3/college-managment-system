<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - CMS</title>
  <link rel="stylesheet" href="signup.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
  <div class="container auth-page">
    <div class="form-box login">
      <form id="forgotForm">
        <h1>Forgot Password</h1>
        <p class="form-hint">Enter your Gmail and we’ll send a reset link.</p>
        <div class="input-box">
          <input id="forgotEmail" type="email" placeholder="Gmail address" required>
          <i class="bx bxs-envelope"></i>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
        <p id="forgotStatus" class="form-footer"></p>
        <a href="singup.html" class="back-link">Back to Login</a>
      </form>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>

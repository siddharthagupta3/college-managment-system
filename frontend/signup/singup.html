<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup - CMS</title>
    <link rel="stylesheet" href="signup.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form id="loginForm">
                <h1>Login</h1>
                <div class="input-box">
                    <input id="loginEmail" type="email" placeholder="Gmail address" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input id="loginPassword" type="password" placeholder="Password" required>
                    <i class='bx bxs-lock-alt' ></i>
                </div>
                <div class="forgot-link">
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google' ></i></a>
                    <a href="#"><i class='bx bxl-facebook' ></i></a>
                    <a href="#"><i class='bx bxl-github' ></i></a>
                    <a href="#"><i class='bx bxl-linkedin' ></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form id="signupForm">
                <h1>Registration</h1>
                <p class="form-hint">Set your username later in Profile after verification.</p>
                <div class="input-box">
                    <input id="signupName" type="text" placeholder="Full Name" required autocomplete="name">
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input id="signupEmail" type="email" placeholder="Gmail address" required autocomplete="email">
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input id="signupPhone" type="tel" placeholder="Phone number" required autocomplete="tel">
                    <i class='bx bxs-phone'></i>
                </div>
                <div class="input-box">
                    <input id="signupPassword" type="password" placeholder="Password (min 6)" required minlength="6" autocomplete="new-password">
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Create account</button>
                <p class="form-footer">We’ll send a verification link to your Gmail.</p>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="signup.js"></script>
</body>
</html>
